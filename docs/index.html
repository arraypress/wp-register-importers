<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WordPress Register Importers</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="description" content="WordPress library for creating CSV import interfaces with a declarative API.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
        name: 'WP Register Importers',
        repo: '',
        loadSidebar: true,
        subMaxLevel: 3,
        search: {
            placeholder: 'Search docs...',
            noData: 'No results found',
            depth: 3,
        },
        copyCode: {
            buttonText: 'Copy',
            successText: 'Copied',
        },
        auto2top: true,
        homepage: 'home.md',
    };
</script>

<!-- Docsify core -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

<!-- Plugins -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
